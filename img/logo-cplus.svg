<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a373;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8c88a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9955a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Crescent moon forming a C shape -->
  <path d="M 60 15 
           A 45 45 0 1 0 60 105 
           A 35 35 0 1 1 60 15 Z" 
        fill="url(#goldGrad)" />
  <!-- Plus/cross inside the crescent -->
  <line x1="50" y1="60" x2="85" y2="60" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="67.5" y1="42.5" x2="67.5" y2="77.5" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
</svg>
