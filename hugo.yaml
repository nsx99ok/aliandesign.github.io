baseURL: "https://astro.aliandesign.com/"
title: "AstroAligned | Where Zodiac Meets BaZi"
theme: hugo-PaperMod
languageCode: en-us
defaultContentLanguage: en
pagination:
  pagerSize: 5

enableRobotsTXT: true
enableEmoji: true
pygmentsUseClasses: true
hasCJKLanguage: false

permalinks:
  posts: /:year/:month/:slug/

outputs:
  home: ["HTML", "RSS", "JSON"]
  page: ["HTML"]
  section: ["HTML", "RSS"]

params:
  env: production
  title: "AstroAligned"
  description: "Where Western Zodiac meets Chinese BaZi — daily horoscopes, elemental wisdom, and cross-cultural astrology insights."
  keywords: [Astrology, BaZi, Horoscope, Zodiac, Chinese Astrology, Daily Horoscope, Western Astrology, Four Pillars]
  author: "Alian Design"
  images: ["/img/site-banner.png"]

  # PaperMod theme params
  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: true
  ShowReadingTime: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "When the Stars Speak in Two Tongues"
    Content: |
      Western Zodiac tells you **who you are**. Chinese BaZi tells you **what you're made of**.

      Two systems. One sky. Daily horoscopes, elemental deep-dives, and cross-cultural astrology — all in one place.

      **Start here:** [Your Daily Horoscope](/categories/daily-astrology/) · [BaZi for Beginners](/categories/bazi/) · [Elements & Compatibility](/categories/elements-compatibility/)

  socialIcons:
    - name: pinterest
      url: "https://pinterest.com/arrivalkit"
    - name: rss
      url: "index.xml"
    - name: email
      url: "mailto:hello@aliandesign.com"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    linkFullImages: false

  label:
    text: "AstroAligned"
    icon: /img/logo-icon.svg
    iconHeight: 30

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: daily-astrology
      name: "☀️ Daily Horoscope"
      url: /categories/daily-astrology/
      weight: 10
    - identifier: bazi
      name: "☯️ BaZi (Four Pillars)"
      url: /categories/bazi/
      weight: 20
    - identifier: elements
      name: "🔥 Elements & Compat"
      url: /categories/elements-compatibility/
      weight: 30
    - identifier: chart-plus
      name: "📊 Chart+"
      url: /chart-plus/
      weight: 40
    - identifier: about
      name: "ℹ️ About"
      url: /about/
      weight: 50

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: catppuccin-frappe
    lineNos: false

taxonomies:
  category: categories
  tag: tags
