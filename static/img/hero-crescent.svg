<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a373;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d4a373;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a373;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0d6a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9955a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Glow behind crescent -->
  <circle cx="400" cy="250" r="180" fill="url(#glow)" />
  <!-- Large crescent moon -->
  <path d="M 400 100 
           A 150 150 0 1 0 400 400 
           A 120 120 0 1 1 400 100 Z" 
        fill="url(#goldGrad2)" opacity="0.9" />
  <!-- Plus sign -->
  <line x1="350" y1="250" x2="490" y2="250" stroke="url(#goldGrad2)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="420" y1="180" x2="420" y2="320" stroke="url(#goldGrad2)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Small stars scattered -->
  <circle cx="200" cy="120" r="2" fill="#d4a373" opacity="0.4"/>
  <circle cx="620" cy="140" r="1.5" fill="#d4a373" opacity="0.3"/>
  <circle cx="150" cy="350" r="1.5" fill="#d4a373" opacity="0.35"/>
  <circle cx="680" cy="380" r="2" fill="#d4a373" opacity="0.25"/>
  <circle cx="280" cy="80" r="1" fill="#d4a373" opacity="0.3"/>
  <circle cx="550" cy="80" r="1.5" fill="#d4a373" opacity="0.2"/>
</svg>
